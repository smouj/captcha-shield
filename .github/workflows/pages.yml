name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build & Deploy v4.0 Fortress
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts || bun install --frozen-lockfile
          echo "Dependencies installed successfully"

      - name: Lint
        run: npm run lint -- --max-warnings=0 || true

      - name: Type check
        run: npm run typecheck || true

      - name: Build static export for GitHub Pages
        run: |
          echo "Building CAPTCHA Shield v4.0 Fortress for GitHub Pages..."
          npm run build:pages
          echo "Build completed with exit code $?"

      - name: Create .nojekyll
        run: |
          touch docs/.nojekyll
          echo "Created docs/.nojekyll"

      - name: Copy v4 CDN assets
        run: |
          if [ -d "public/v4" ]; then
            mkdir -p docs/v4
            cp -r public/v4/* docs/v4/ 2>/dev/null || true
            echo "Copied public/v4/ → docs/v4/"
          else
            echo "No public/v4/ directory found, skipping CDN asset copy"
          fi

      - name: Verify build output
        run: |
          echo "Verifying build output..."
          if [ ! -f docs/index.html ]; then
            echo "ERROR: docs/index.html not found — build likely failed"
            echo "Contents of docs/ directory:"
            ls -la docs/ 2>/dev/null || echo "docs/ directory does not exist"
            exit 1
          fi
          if [ ! -f docs/.nojekyll ]; then
            echo "ERROR: docs/.nojekyll not found"
            exit 1
          fi
          echo "docs/index.html exists — size: $(wc -c < docs/index.html) bytes"
          echo "docs/.nojekyll exists"
          echo "Build output verified OK"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
