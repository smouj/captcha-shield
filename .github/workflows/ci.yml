name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts || bun install --frozen-lockfile
          echo "Dependencies installed successfully"

      - name: Run lint
        run: npm run lint -- --max-warnings=150 || true

      - name: Run typecheck
        run: npm run typecheck || true

      - name: Build static export
        run: |
          echo "Building CAPTCHA Shield v4.0 Fortress (static export)..."
          npm run build:pages

      - name: Verify build output
        run: |
          if [ ! -f docs/index.html ]; then
            echo "ERROR: docs/index.html not found — build likely failed"
            exit 1
          fi
          echo "docs/index.html verified — size: $(wc -c < docs/index.html) bytes"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: docs/
          retention-days: 7
